version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  frontend:
    image: node:18-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4173:4173"
    command: sh -c "npm install && npm run build && npx vite preview --host 0.0.0.0 --port 4173"
    depends_on:
      - backend
